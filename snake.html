<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>贪吃蛇 - To Tracy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(180deg, #87CEEB 0%, #98D8E8 100%);
            touch-action: none;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        #statusBar {
            width: 100%;
            max-width: 500px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.85);
            border-radius: 12px;
            border: 3px solid #8b4513;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: bold;
            color: #5c3317;
        }

        #hearts { color: #ff4757; font-size: 22px; }
        #score { color: #5c3317; }

        #godBtn {
            position: fixed;
            top: 10px;
            right: 10px;
            padding: 8px 14px;
            background: linear-gradient(180deg, #e0b878 0%, #c8945a 100%);
            border: 3px solid #6b4423;
            color: #5c3317;
            cursor: pointer;
            border-radius: 8px;
            font-size: 13px;
            font-weight: bold;
            z-index: 50;
            box-shadow: 0 4px 0 #6b4423;
        }
        #godBtn.active {
            background: linear-gradient(180deg, #ffd700 0%, #ffa500 100%);
            color: white;
            box-shadow: 0 4px 0 #cc8400, 0 0 20px rgba(255, 215, 0, 0.6);
        }

        #gameCanvas {
            background: #c8e6a0;
            border: 4px solid #8b4513;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            touch-action: none;
        }
      
        #dialogBox {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 90%;
            min-width: 280px;
            background:
                repeating-linear-gradient(90deg,
                    rgba(139, 90, 43, 0.15) 0px,
                    rgba(139, 90, 43, 0.15) 1px,
                    transparent 1px,
                    transparent 4px),
                linear-gradient(180deg,
                    #f5e6c8 0%,
                    #f0d9a8 50%,
                    #e8c98a 100%);
            border: 4px solid #6b4423;
            border-radius: 8px;
            padding: 18px 24px;
            box-shadow:
                inset 0 2px 0 rgba(255, 255, 255, 0.5),
                inset 0 -2px 0 rgba(0, 0, 0, 0.15),
                0 6px 15px rgba(0, 0, 0, 0.3);
            color: #5c3317;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
            pointer-events: none;
            line-height: 1.5;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
        }
        #dialogBox.show { opacity: 1; }

        #dialogBox::after {
            content: '';
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 14px solid #6b4423;
        }
        #dialogBox::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 11px solid transparent;
            border-right: 11px solid transparent;
            border-top: 11px solid #f0d9a8;
            z-index: 1;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .overlay.active { display: flex; }

        .overlay-content {
            background: white;
            padding: 40px 30px;
            border-radius: 16px;
            border: 5px solid #8b4513;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .overlay-content h2 {
            color: #8b4513;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .overlay-content p {
            color: #555;
            margin-bottom: 15px;
            font-size: 16px;
            line-height: 1.6;
        }

        .overlay-content button {
            padding: 12px 30px;
            font-size: 18px;
            background: linear-gradient(180deg, #d4a76a 0%, #b8864a 100%);
            border: 3px solid #6b4423;
            color: #5c3317;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 15px;
        }

        .overlay-content button:hover {
            background: linear-gradient(180deg, #e0b878 0%, #c8945a 100%);
        }

        .stat {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
        }

        .back-link {
            position: fixed;
            top: 10px;
            left: 10px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.9);
            border: 2px solid #8b4513;
            color: #5c3317;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            z-index: 50;
        }

        .hint {
            margin-top: 10px;
            color: #8b4513;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<a href=" " class="back-link">← 返回</a >

<button id="godBtn" onclick="toggleGod()">🛡️ 无敌 OFF</button>

<div id="gameContainer">
    <div id="statusBar">
        <span id="hearts">❤️❤️❤️❤️❤️</span>
        <span id="score">0 分</span>
    </div>

    <div id="dialogBox"></div>

    <canvas id="gameCanvas"></canvas>

    <div class="hint">滑动屏幕控制方向</div>
</div>

<div class="overlay active" id="startOverlay">
    <div class="overlay-content">
        <h2>🐍 贪吃蛇</h2>
        <p>滑动屏幕控制蛇的移动</p >
        <p>🍎 苹果 +1 分</p >
        <p>⭐ 星星 +5 分</p >
        <p>❤️ 爱心 +1 血</p >
        <p>小心 💩 粪便 -1 血 + 减速</p >
        <p style="color:#ff6b6b; font-size:14px;">右上角可开无敌模式</p >
        <button onclick="startGame()">开始游戏</button>
    </div>
</div>

<div class="overlay" id="gameOverOverlay">
    <div class="overlay-content">
        <h2>游戏结束</h2>
        <div class="stat"><span>本局得分</span><span id="finalScore">0</span></div>
        <div class="stat"><span>最高分</span><span id="highScore">0</span></div>
        <p id="gameOverMsg" style="margin-top: 15px; color: #8b4513;"></p >
        <button onclick="restartGame()">再玩一次</button>
        <button onclick="location.href='main.html'" style="margin-left:10px; background: #ccc;">返回主页</button>
    </div>
</div>

<script>
    const msgScript = document.createElement('script');
    msgScript.src = 'game-messages.js';
    document.head.appendChild(msgScript);
</script>
<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    const GRID_SIZE = 20;
    let CELL_SIZE;
    let canvasSize;

    function resizeCanvas() {
        const maxW = Math.min(window.innerWidth - 20, 500);
        const maxH = window.innerHeight - 180;
        canvasSize = Math.floor(Math.min(maxW, maxH) / GRID_SIZE) * GRID_SIZE;
        canvas.width = canvasSize;
        canvas.height = canvasSize;
        CELL_SIZE = canvasSize / GRID_SIZE;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const images = {};
    const imageList = ['snake-head', 'snake-body', 'food-apple', 'food-star', 'food-heart', 'food-poop'];
    imageList.forEach(name => {
        const img = new Image();
        img.src = `${name}.png`;
        img.onerror = () => console.log(`图片 ${name}.png 加载失败`);
        images[name] = img;
    });

    let snake, direction, nextDirection, foods, score, hearts, speed, gameLoop, isPlaying, highScore;
    let godMode = false;
  
    function toggleGod() {
        godMode = !godMode;
        const btn = document.getElementById('godBtn');
        if (godMode) {
            btn.classList.add('active');
            btn.textContent = '🛡️ 无敌 ON';
        } else {
            btn.classList.remove('active');
            btn.textContent = '🛡️ 无敌 OFF';
        }
    }

    function initGame() {
        snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
        direction = 'right';
        nextDirection = 'right';
        score = 0;
        hearts = 5;
        speed = 200;
        foods = [];
        isPlaying = false;
        highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');

        for (let i = 0; i < 3; i++) {
            spawnFood();
        }
        updateStatus();
    }

    function startGame() {
        document.getElementById('startOverlay').classList.remove('active');
        initGame();
        isPlaying = true;
        gameLoop = setInterval(update, speed);
    }

    function restartGame() {
        document.getElementById('gameOverOverlay').classList.remove('active');
        startGame();
    }

    function spawnFood() {
        const types = ['apple', 'apple', 'apple', 'apple', 'star', 'heart', 'poop'];
        const type = types[Math.floor(Math.random() * types.length)];
        let pos;
        do {
            pos = {
                x: Math.floor(Math.random() * GRID_SIZE),
                y: Math.floor(Math.random() * GRID_SIZE)
            };
        } while (isOccupied(pos));
        foods.push({ ...pos, type });
    }

    function isOccupied(pos) {
        if (snake.some(s => s.x === pos.x && s.y === pos.y)) return true;
        if (foods.some(f => f.x === pos.x && f.y === pos.y)) return true;
        return false;
    }

    function showDialog(text) {
        const el = document.getElementById('dialogBox');
        el.textContent = text;
        el.classList.add('show');
        clearTimeout(el.timer);
        el.timer = setTimeout(() => el.classList.remove('show'), 1800);
    }

    function triggerMsg(category) {
        if (!MESSAGES || !MESSAGES[category]) return;
        const list = MESSAGES[category];
        const msg = list[Math.floor(Math.random() * list.length)];
        if (msg && !msg.startsWith('【填')) {
            showDialog(msg);
        }
    }
  
    function update() {
        if (!isPlaying) return;

        direction = nextDirection;

        const head = { ...snake[0] };
        if (direction === 'up') head.y--;
        if (direction === 'down') head.y++;
        if (direction === 'left') head.x--;
        if (direction === 'right') head.x++;

        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
            if (!godMode) {
                hearts--;
                triggerMsg('hitWall');
                updateStatus();
                if (hearts <= 0) return gameOver();
            }
            if (head.x < 0) head.x = GRID_SIZE - 1;
            if (head.x >= GRID_SIZE) head.x = 0;
            if (head.y < 0) head.y = GRID_SIZE - 1;
            if (head.y >= GRID_SIZE) head.y = 0;
        }

        if (snake.some(s => s.x === head.x && s.y === head.y)) {
            if (!godMode) {
                hearts--;
                triggerMsg('hitSelf');
                updateStatus();
                if (hearts <= 0) return gameOver();
            }
        }

        snake.unshift(head);

        const foodIndex = foods.findIndex(f => f.x === head.x && f.y === head.y);
        if (foodIndex >= 0) {
            const food = foods[foodIndex];
            foods.splice(foodIndex, 1);

            if (food.type === 'apple') {
                score += 1;
                triggerMsg('apple');
            } else if (food.type === 'star') {
                score += 5;
                triggerMsg('star');
            } else if (food.type === 'heart') {
                if (!godMode) {
                    hearts = Math.min(hearts + 1, 5);
                    updateStatus();
                }
                triggerMsg('heart');
            } else if (food.type === 'poop') {
                if (!godMode) {
                    hearts--;
                    updateStatus();
                    if (hearts <= 0) return gameOver();
                    if (speed < 350) {
                        speed += 30;
                        clearInterval(gameLoop);
                        gameLoop = setInterval(update, speed);
                    }
                }
                triggerMsg('poop');
            }

            spawnFood();
        } else {
            snake.pop();
        }

        updateStatus();
        draw();
    }
  
    function updateStatus() {
        document.getElementById('hearts').textContent = '❤️'.repeat(Math.max(0, hearts)) || '💀';
        document.getElementById('score').textContent = score + ' 分';
    }

    function draw() {
        ctx.fillStyle = '#c8e6a0';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.strokeStyle = 'rgba(139, 90, 43, 0.1)';
        for (let i = 0; i <= GRID_SIZE; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, canvas.height);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(canvas.width, i * CELL_SIZE);
            ctx.stroke();
        }

        snake.forEach((seg, i) => {
            const img = i === 0 ? images['snake-head'] : images['snake-body'];
            if (img && img.complete) {
                ctx.drawImage(img, seg.x * CELL_SIZE, seg.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else {
                ctx.fillStyle = i === 0 ? '#2d5e1e' : '#4a8b2e';
                ctx.fillRect(seg.x * CELL_SIZE + 1, seg.y * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
            }
        });

        foods.forEach(food) => {
            const img = images['food-' + food.type];
            if (img && img.complete) {
                ctx.drawImage(img, food.x * CELL_SIZE, food.y * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            } else {
                const emojiMap = { apple: '🍎', star: '⭐', heart: '❤️', poop: '💩' };
                ctx.font = (CELL_SIZE * 0.8) + 'px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(emojiMap[food.type], food.x * CELL_SIZE + CELL_SIZE/2, food.y * CELL_SIZE + CELL_SIZE/2);
            }
        });
    }
  
    function gameOver() {
        clearInterval(gameLoop);
        isPlaying = false;

        if (score > highScore) {
            highScore = score;
            localStorage.setItem('snakeHighScore', highScore);
        }

        document.getElementById('finalScore').textContent = score;
        document.getElementById('highScore').textContent = highScore;

        const msgs = MESSAGES?.gameOver || [];
        const msg = msgs[Math.floor(Math.random() * msgs.length)];
        document.getElementById('gameOverMsg').textContent = (msg && !msg.startsWith('【填')) ? msg : '';

        document.getElementById('gameOverOverlay').classList.add('active');
    }

    let touchStartX = 0, touchStartY = 0;
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: false });

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (!isPlaying) return;
        const dx = e.touches[0].clientX - touchStartX;
        const dy = e.touches[0].clientY - touchStartY;
        const absDx = Math.abs(dx);
        const absDy = Math.abs(dy);

        if (Math.max(absDx, absDy) < 30) return;

        if (absDx > absDy) {
            if (dx > 0 && direction !== 'left') nextDirection = 'right';
            else if (dx < 0 && direction !== 'right') nextDirection = 'left';
        } else {
            if (dy > 0 && direction !== 'up') nextDirection = 'down';
            else if (dy < 0 && direction !== 'down') nextDirection = 'up';
        }
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if (!isPlaying) return;
        if (e.key === 'ArrowUp' && direction !== 'down') nextDirection = 'up';
        if (e.key === 'ArrowDown' && direction !== 'up') nextDirection = 'down';
        if (e.key === 'ArrowLeft' && direction !== 'right') nextDirection = 'left';
        if (e.key === 'ArrowRight' && direction !== 'left') nextDirection = 'right';
    });

    initGame();
    draw();
</script>

</body>
</html>
