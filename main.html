<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Tracy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        /* ========== 主页 ========== */
        #mainPage {
            width: 100%;
            height: 100%;
            background: url('images/bg.jpg') center/cover no-repeat;
            display: block;
            position: relative;
        }

        /* ========== 木纹框通用样式 ========== */
        .wood-frame {
            background:
                repeating-linear-gradient(90deg,
                    rgba(139, 90, 43, 0.15) 0px,
                    rgba(139, 90, 43, 0.15) 1px,
                    transparent 1px,
                    transparent 4px),
                linear-gradient(180deg,
                    #d4a76a 0%,
                    #c8945a 30%,
                    #b8864a 70%,
                    #a87838 100%);
            border: 4px solid #6b4423;
            border-radius: 6px;
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.3),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3),
                0 8px 20px rgba(0, 0, 0, 0.4);
            color: #5c3317;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
            position: relative;
            transition: all 0.2s;
        }

        .wood-frame::before,
        .wood-frame::after {
            content: '';
            position: absolute;
            width: 6px;
            height: 6px;
            background: radial-gradient(circle, #4a2c1a 30%, #6b4423 70%);
            border-radius: 50%;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
        }
        .wood-frame::before { top: 4px; left: 4px; }
        .wood-frame::after { top: 4px; right: 4px; }

        .title {
            position: absolute;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            padding: 18px 50px;
            font-size: 36px;
            letter-spacing: 8px;
        }

        .menu {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
        }

        .btn {
            width: 140px;
            height: 110px;
            font-size: 24px;
            letter-spacing: 4px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow:
                inset 0 1px 0 rgba(255, 255, 255, 0.4),
                inset 0 -1px 0 rgba(0, 0, 0, 0.3),
                0 12px 25px rgba(0, 0, 0, 0.5);
        }
        .btn:active { transform: translateY(-2px); }

        .btn-icon {
            margin-top: 6px;
            font-size: 16px;
            color: #8b4513;
        }

        .scene {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(135, 206, 235, 0.96);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        .scene.active { display: flex; }

        .scene-content {
            max-width: 600px;
            width: 90%;
            max-height: 75vh;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 10px;
            border: 4px solid #8b4513;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            color: #333;
            font-size: 16px;
            line-height: 1.8;
        }

        .scene-content h2 {
            color: #8b4513;
            margin-bottom: 20px;
            font-size: 24px;
            text-align: center;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: linear-gradient(180deg, #d4a76a 0%, #b8864a 100%);
            border: 3px solid #6b4423;
            color: #5c3317;
            cursor: pointer;
            font-weight: bold;
            border-radius: 6px;
            z-index: 100;
        }
    </style>
</head>
<body>

    <!-- 主页 -->
    <div id="mainPage">
        <div class="title wood-frame">To Tracy</div>

        <div class="menu">
            <div class="btn wood-frame" onclick="showScene('letter')">
                留言
                <span class="btn-icon">⭐</span>
            </div>
           <div class="btn wood-frame" onclick="window.location.href='snake.html'">
                小游戏
                <span class="btn-icon">🍃</span>
            </div>
            <div class="btn wood-frame" onclick="window.location.href='chat.html'">
                聊天
                <span class="btn-icon">❤️</span>
            </div>
        </div>

        <div class="scene" id="letter">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>📜 留言</h2>
                <p>这里写你的留言内容。</p >
            </div>
        </div>

        <div class="scene" id="game">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>🐍 小游戏</h2>
                <p>贪吃蛇放在这里。</p >
            </div>
        </div>

        <div class="scene" id="chat">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>🧑 Q版的我</h2>
                <p>Q版对话模式放在这里。</p >
            </div>
        </div>
    </div>

    <script>
        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function hideScene() {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        }
    </script>
</body>
</html>
