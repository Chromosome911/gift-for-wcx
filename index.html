<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Tracy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #333;
            font-size: 24px;
            font-weight: 500;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #999;
            font-size: 14px;
            margin-bottom: 30px;
        }

        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
            text-align: center;
            letter-spacing: 1px;
        }

        input:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            font-size: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 2px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .message {
            margin-top: 20px;
            min-height: 24px;
            color: #ff6b6b;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .message.show {
            opacity: 1;
        }

        .hint {
            margin-top: 30px;
            color: #bbb;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>To Tracy</h1>
        <p class="subtitle">输入密码才能看到哦</p >
        <input type="text" id="passwordInput" placeholder="输入密码" autocomplete="off">
        <button onclick="checkPassword()">解 锁</button>
        <p class="message" id="message"></p >
        <p class="hint">ps:你知道的</p >
    </div>

    <script>
        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const message = document.getElementById('message');
            
            const correctPassword = "080213";
            
            if (input === correctPassword) {
                window.location.href = "https://chromosome911.github.io/gift-for-wcx/main.html";
            } else {
                message.textContent = "密码不对哦，再想想";
                message.classList.add('show');
                document.getElementById('passwordInput').value = '';
                
                setTimeout(() => {
                    message.classList.remove('show');
                }, 3000);
            }
        }

        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkPassword();
            }
        });
    </script>
</body>
</html>
