<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Tracy</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4a76a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="To Tracy">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        #loadingScreen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, #87CEEB 0%, #B0E0E6 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s ease;
        }
        #loadingScreen.fade-out { opacity: 0; visibility: hidden; }
        .loading-text {
            color: #5c3317;
            font-size: 18px;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .loading-dots { display: flex; gap: 8px; }
        .loading-dot {
            width: 10px; height: 10px;
            background: #8b4513;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .loading-dot:nth-child(1) { animation-delay: 0s; }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }

        #mainPage {
            opacity: 0;
            transition: opacity 1s ease;
        }
        #mainPage.loaded { opacity: 1; }

        #mainPage {
            width: 100%;
            height: 100%;
            background: url('images/bg.jpg') center/cover no-repeat;
            display: block;
            position: relative;
        }
    </style>
</head>
<body>
    <style>
.wood-frame {
    background:
        repeating-linear-gradient(90deg,
            rgba(139, 90, 43, 0.15) 0px,
            rgba(139, 90, 43, 0.15) 1px,
            transparent 1px,
            transparent 4px),
        linear-gradient(180deg,
            #d4a76a 0%, #c8945a 30%, #b8864a 70%, #a87838 100%);
    border: 4px solid #6b4423;
    border-radius: 6px;
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3),
        0 8px 20px rgba(0, 0, 0, 0.4);
    color: #5c3317;
    font-weight: bold;
    text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.4);
    position: relative;
    transition: all 0.2s;
}

.wood-frame::before, .wood-frame::after {
    content: '';
    position: absolute;
    width: 6px; height: 6px;
    background: radial-gradient(circle, #4a2c1a 30%, #6b4423 70%);
    border-radius: 50%;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
}
.wood-frame::before { top: 4px; left: 4px; }
.wood-frame::after { top: 4px; right: 4px; }

.title {
    position: absolute;
    top: 5%;
    left: 50%;
    transform: translateX(-50%);
    padding: 18px 50px;
    font-size: 36px;
    letter-spacing: 8px;
}

.menu {
    position: absolute;
    bottom: 12%;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 25px;
}

.btn {
    width: 140px;
    height: 110px;
    font-size: 24px;
    letter-spacing: 4px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-width: 88px;
    min-height: 88px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

.btn:hover {
    transform: translateY(-4px);
    box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -1px 0 rgba(0, 0, 0, 0.3),
        0 12px 25px rgba(0, 0, 0, 0.5);
}
.btn:active { transform: translateY(-2px); }

.btn-icon {
    margin-top: 6px;
    font-size: 16px;
    color: #8b4513;
}

.scene {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(135, 206, 235, 0.96);
    display: none;
    align-items: center;
    justify-content: center;
    padding: 40px;
}
.scene.active { display: flex; }

.scene-content {
    max-width: 600px;
    width: 90%;
    max-height: 75vh;
    overflow-y: auto;
    background: rgba(255, 255, 255, 0.95);
    padding: 40px;
    border-radius: 10px;
    border: 4px solid #8b4513;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    color: #333;
    font-size: 16px;
    line-height: 1.8;
}

.scene-content h2 {
    color: #8b4513;
    margin-bottom: 20px;
    font-size: 24px;
    text-align: center;
}

.back-btn {
    position: fixed;
    top: 20px;
    left: 20px;
    padding: 10px 20px;
    background: linear-gradient(180deg, #d4a76a 0%, #b8864a 100%);
    border: 3px solid #6b4423;
    color: #5c3317;
    cursor: pointer;
    font-weight: bold;
    border-radius: 6px;
    z-index: 100;
    min-height: 44px;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
}

@media (max-width: 600px) {
    .title {
        font-size: 28px;
        padding: 14px 32px;
        letter-spacing: 5px;
    }
    .menu {
        gap: 14px;
        flex-wrap: wrap;
        justify-content: center;
        bottom: 8%;
    }
    .btn {
        width: 110px;
        height: 95px;
        font-size: 20px;
    }
    .scene-content {
        padding: 24px 20px;
        font-size: 15px;
    }
    .back-btn {
        padding: 12px 18px;
        font-size: 15px;
    }
}
</style>
    <div id="loadingScreen">
        <div class="loading-text">正在打开这扇门...</div>
        <div class="loading-dots">
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
            <div class="loading-dot"></div>
        </div>
    </div>

    <div id="mainPage">
        <div class="title wood-frame">To Tracy</div>

        <div class="menu">
            <div class="btn wood-frame" onclick="window.location.href='letter.html'">
                留言
                <span class="btn-icon">⭐</span>
            </div>
           <div class="btn wood-frame" onclick="window.location.href='snake.html'">
                小游戏
                <span class="btn-icon">🍃</span>
            </div>
            <div class="btn wood-frame" onclick="window.location.href='chat.html'">
                聊天
                <span class="btn-icon">❤️</span>
            </div>
        </div>

        <div class="scene" id="letter">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>📜 留言</h2>
                <p>这里写你的留言内容。</p >
            </div>
        </div>

        <div class="scene" id="game">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>🐍 小游戏</h2>
                <p>贪吃蛇放在这里。</p >
            </div>
        </div>

        <div class="scene" id="chat">
            <button class="back-btn" onclick="hideScene()">← 返回</button>
            <div class="scene-content">
                <h2>🧑 Q版的我</h2>
                <p>Q版对话模式放在这里。</p >
            </div>
        </div>
    </div>

    <script>
        function showScene(id) {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function hideScene() {
            document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loadingScreen').classList.add('fade-out');
                document.getElementById('mainPage').classList.add('loaded');
            }, 600);
        });
    </script>
</body>
</html>
